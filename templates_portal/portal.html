<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeuralHub — Portal</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#090d13;--bg1:#0f1520;--bg2:#161e2e;--bg3:#1e2840;
  --ln:rgba(255,255,255,0.06);--ln2:rgba(255,255,255,0.11);
  --blue:#3b82f6;--blue-d:#2563eb;--blue-bg:rgba(59,130,246,0.10);--blue-bd:rgba(59,130,246,0.28);
  --green:#22c55e;--green-bg:rgba(34,197,94,0.10);--green-bd:rgba(34,197,94,0.25);
  --red:#ef4444;--red-bg:rgba(239,68,68,0.10);--red-bd:rgba(239,68,68,0.28);
  --yellow:#f59e0b;--yellow-bg:rgba(245,158,11,0.10);--yellow-bd:rgba(245,158,11,0.25);
  --t1:#edf2f7;--t2:#8b96aa;--t3:#4a5468;
  --r:7px;--r2:12px;--sans:'IBM Plex Sans',sans-serif;--mono:'IBM Plex Mono',monospace;
}
html,body{height:100%;font-family:var(--sans);background:var(--bg);color:var(--t1);font-size:15px;line-height:1.55}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:9px}

/* NAV */
#nav{display:flex;align-items:center;height:52px;padding:0 18px;gap:8px;background:var(--bg1);border-bottom:1px solid var(--ln);position:sticky;top:0;z-index:10}
.nlogo{display:flex;align-items:center;gap:9px;font-size:16px;font-weight:600;padding-right:16px;border-right:1px solid var(--ln)}
.nlogo-i{width:28px;height:28px;border-radius:6px;background:var(--blue);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;font-family:var(--mono);color:#fff}
.nbadge{padding:2px 10px;border-radius:20px;font-size:11px;font-weight:500;background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-bd)}
.nsep{flex:1}
.srv-wrap{display:flex;align-items:center;gap:6px;margin-right:10px}
.sdot{width:7px;height:7px;border-radius:50%;background:var(--t3)}
.sdot.on{background:var(--green);box-shadow:0 0 5px var(--green)}
.sdot.off{background:var(--red)}
.stxt{font-size:12px;color:var(--t3)}
.nbtn{padding:6px 14px;border-radius:var(--r);font-size:13px;color:var(--t2);background:transparent;border:1px solid var(--ln2);cursor:pointer;font-family:var(--sans);transition:all .15s}
.nbtn:hover{background:var(--bg2);color:var(--t1)}
.nav-av{width:30px;height:30px;border-radius:50%;background:var(--blue-bg);border:1px solid var(--blue-bd);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--blue);font-family:var(--mono)}

/* PAGE */
#page{max-width:900px;margin:0 auto;padding:36px 20px 60px}

/* HEADER */
.pg-hdr{margin-bottom:32px}
.pg-ttl{font-size:22px;font-weight:600;margin-bottom:4px}
.pg-sub{font-size:14px;color:var(--t3)}

/* EMPTY */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:80px 20px;gap:12px}
.empty-ico{font-size:3rem;opacity:.1}
.empty-ttl{font-size:17px;font-weight:500;color:var(--t2)}
.empty-sub{font-size:13px;color:var(--t3);max-width:360px;line-height:1.7}

/* GRID */
#grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}

/* MODEL CARD */
.mcard{background:var(--bg1);border:1px solid var(--ln2);border-radius:var(--r2);padding:22px;display:flex;flex-direction:column;gap:14px;transition:border-color .15s;cursor:pointer}
.mcard:hover{border-color:var(--blue-bd)}
.mc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.mc-icon{width:40px;height:40px;border-radius:10px;background:var(--blue-bg);border:1px solid var(--blue-bd);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.mc-name{font-size:15px;font-weight:600;line-height:1.3;flex:1}
.mc-desc{font-size:13px;color:var(--t3);line-height:1.6}
.mc-target{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11px;font-family:var(--mono);background:var(--bg3);color:var(--t2);border:1px solid var(--ln2)}
.mc-stats{display:flex;gap:14px;padding-top:12px;border-top:1px solid var(--ln)}
.mc-stat{display:flex;flex-direction:column;gap:2px}
.mc-stat-l{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--t3)}
.mc-stat-v{font-size:14px;font-weight:600;font-family:var(--mono)}
.mc-stat-v.green{color:var(--green)}
.mc-stat-v.blue{color:var(--blue)}
.mc-stat-v.dim{color:var(--t3)}
.mc-features{display:flex;flex-wrap:wrap;gap:5px}
.fc{padding:2px 8px;border-radius:5px;font-size:11px;font-family:var(--mono);background:var(--bg3);color:var(--t3);border:1px solid var(--ln)}
.fc-more{color:var(--t3);font-size:11px;font-family:var(--mono);padding:2px 4px}

/* STATUS PILL */
.spill{display:inline-flex;align-items:center;gap:5px;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:500}
.spill.trained{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd)}
.spill.untrained{background:var(--yellow-bg);color:var(--yellow);border:1px solid var(--yellow-bd)}

/* DETAIL PANEL (slide-over) */
#panel-overlay{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);opacity:0;pointer-events:none;transition:opacity .2s}
#panel-overlay.open{opacity:1;pointer-events:all}
#panel{position:fixed;top:0;right:0;height:100vh;width:420px;max-width:95vw;background:var(--bg1);border-left:1px solid var(--ln2);z-index:101;transform:translateX(100%);transition:transform .25s cubic-bezier(.4,0,.2,1);overflow-y:auto;padding:28px}
#panel.open{transform:translateX(0)}
.panel-close{position:absolute;top:18px;right:18px;background:var(--bg2);border:1px solid var(--ln2);color:var(--t2);width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.panel-close:hover{background:var(--bg3);color:var(--t1)}
.panel-ttl{font-size:19px;font-weight:600;margin-bottom:4px;padding-right:40px}
.panel-sub{font-size:13px;color:var(--t3);margin-bottom:24px}
.panel-section{margin-bottom:22px}
.panel-section-ttl{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--t3);margin-bottom:10px}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--ln);font-size:13px}
.info-row:last-child{border-bottom:none}
.info-label{color:var(--t3)}
.info-val{font-family:var(--mono);font-size:12px;color:var(--t1)}
.feat-grid{display:flex;flex-wrap:wrap;gap:6px}
.feat-pill{padding:4px 10px;border-radius:6px;font-size:12px;font-family:var(--mono);background:var(--bg3);color:var(--t2);border:1px solid var(--ln2)}

/* MODAL */
.overlay{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--bg1);border:1px solid var(--ln2);border-radius:16px;padding:28px;width:380px;box-shadow:0 24px 60px rgba(0,0,0,.6);transform:scale(.95);transition:transform .2s}
.overlay.open .modal{transform:scale(1)}
.mf{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
.btn{padding:8px 16px;border-radius:var(--r);font-size:14px;font-family:var(--sans);border:1px solid var(--ln2);cursor:pointer;color:var(--t2);background:transparent;transition:all .15s}
.btn:hover{background:var(--bg2);color:var(--t1)}
.btn-d{background:var(--red);border-color:var(--red);color:#fff}.btn-d:hover{background:#dc2626}

/* LOADING */
.loading{display:flex;align-items:center;justify-content:center;gap:8px;padding:60px;color:var(--t3);font-size:14px}
.spin{width:18px;height:18px;border:2px solid var(--ln2);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<nav id="nav">
  <div class="nlogo"><div class="nlogo-i">N</div>NeuralHub</div>
  <span class="nbadge">Prediction Portal</span>
  <div class="nsep"></div>
  <div class="srv-wrap"><div class="sdot" id="sdot"></div><span class="stxt" id="stxt">Connecting…</span></div>
  <button class="nbtn" onclick="openM('m-acct')">⚙ Account</button>
  <button class="nbtn" onclick="doLogout()">Sign Out</button>
  <div style="display:flex;align-items:center;gap:8px;padding-left:12px;border-left:1px solid var(--ln)">
    <div class="nav-av" id="nav-av">U</div>
    <span style="font-size:13px;color:var(--t2)" id="nav-un"></span>
  </div>
</nav>

<div id="page">
  <div class="pg-hdr">
    <div class="pg-ttl">Available Models</div>
    <div class="pg-sub" id="pg-sub">Loading…</div>
  </div>
  <div id="grid"></div>
</div>

<!-- SLIDE-OVER DETAIL PANEL -->
<div id="panel-overlay" onclick="closePanel()"></div>
<div id="panel">
  <button class="panel-close" onclick="closePanel()">✕</button>
  <div class="panel-ttl" id="p-name"></div>
  <div class="panel-sub" id="p-desc"></div>

  <div class="panel-section">
    <div class="panel-section-ttl">Model Info</div>
    <div class="info-row"><span class="info-label">Target column</span><span class="info-val" id="p-target"></span></div>
    <div class="info-row"><span class="info-label">Version</span><span class="info-val" id="p-ver"></span></div>
    <div class="info-row"><span class="info-label">Accuracy</span><span class="info-val" id="p-acc"></span></div>
    <div class="info-row"><span class="info-label">Last updated</span><span class="info-val" id="p-upd"></span></div>
    <div class="info-row"><span class="info-label">Status</span><span id="p-status"></span></div>
  </div>

  <div class="panel-section">
    <div class="panel-section-ttl">Input Features</div>
    <div class="feat-grid" id="p-feats"></div>
  </div>
</div>

<!-- ACCOUNT MODAL -->
<div class="overlay" id="m-acct">
  <div class="modal">
    <div style="font-size:18px;font-weight:600;margin-bottom:5px">Account</div>
    <div style="font-size:13px;color:var(--t3);margin-bottom:18px">Signed in as <b id="m-user"></b></div>
    <div style="background:var(--red-bg);border:1px solid var(--red-bd);border-radius:7px;padding:14px;font-size:13px;color:var(--t2);line-height:1.6">
      <b style="color:var(--red)">Delete Account</b><br>Permanently removes your portal account from the server.
    </div>
    <div class="mf">
      <button class="btn" onclick="closeM('m-acct')">Close</button>
      <button class="btn btn-d" onclick="doDelete()">Delete Account</button>
    </div>
  </div>
</div>

<script>
'use strict';
let ME = '', models = [];

// ── BOOT ──────────────────────────────────────────────────────────────────────
window.addEventListener('load', async () => {
  let me = { logged_in: false };
  try { me = await fetch('/api/portal/me').then(r => r.json()); } catch(_) {}
  if (!me.logged_in) { window.location.href = '/login'; return; }

  ME = me.username;
  document.getElementById('nav-av').textContent = ME.slice(0,2).toUpperCase();
  document.getElementById('nav-un').textContent = ME;
  document.getElementById('m-user').textContent = ME;

  checkStatus();
  setInterval(checkStatus, 30000);
  loadModels();
});

// ── STATUS ────────────────────────────────────────────────────────────────────
async function checkStatus() {
  try {
    const r = await fetch('/api/portal/status').then(r => r.json());
    document.getElementById('sdot').className = r.online ? 'sdot on' : 'sdot off';
    document.getElementById('stxt').textContent = r.online ? 'Connected' : 'Server offline';
  } catch(_) {
    document.getElementById('sdot').className = 'sdot off';
    document.getElementById('stxt').textContent = 'Offline';
  }
}

// ── LOAD MODELS ───────────────────────────────────────────────────────────────
async function loadModels() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '<div class="loading"><div class="spin"></div> Loading models…</div>';

  try {
    const data = await fetch('/api/portal/models').then(r => r.json());
    if (data.error) throw new Error(data.error);
    models = Array.isArray(data) ? data : [];
  } catch(e) {
    grid.innerHTML = `<div class="empty"><div class="empty-ico">⚠</div><div class="empty-ttl">Could not load models</div><div class="empty-sub">${esc(e.message)}</div></div>`;
    return;
  }

  const sub = document.getElementById('pg-sub');
  if (models.length === 0) {
    sub.textContent = 'No trained models available yet.';
    grid.innerHTML = `
      <div class="empty">
        <div class="empty-ico">◈</div>
        <div class="empty-ttl">No models available yet</div>
        <div class="empty-sub">Trainers haven't published any models yet. Check back later.</div>
      </div>`;
    return;
  }

  sub.textContent = `${models.length} model${models.length !== 1 ? 's' : ''} available`;
  grid.innerHTML = models.map((m, i) => renderCard(m, i)).join('');
}

function renderCard(m, i) {
  const trained  = (m.version || 0) > 0;
  const acc      = m.performance != null ? (m.performance * 100).toFixed(1) + '%' : '—';
  const feats    = Array.isArray(m.features) ? m.features : [];
  const showFeats = feats.slice(0, 4);
  const extra    = feats.length - showFeats.length;
  const icons    = ['🧠','📊','💡','🔬','📈','🎯','⚕️','🔭'];
  const icon     = icons[i % icons.length];

  return `
  <div class="mcard" onclick="openPanel(${i})">
    <div class="mc-top">
      <div class="mc-icon">${icon}</div>
      <div style="flex:1">
        <div class="mc-name">${esc(m.name)}</div>
        <div style="margin-top:5px">
          <span class="spill ${trained ? 'trained' : 'untrained'}">${trained ? '● Active' : '○ Not trained'}</span>
        </div>
      </div>
    </div>
    ${m.description ? `<div class="mc-desc">${esc(m.description)}</div>` : ''}
    <div>
      <span class="mc-target">target: ${esc(m.target || '—')}</span>
    </div>
    ${feats.length ? `
    <div class="mc-features">
      ${showFeats.map(f => `<span class="fc">${esc(f)}</span>`).join('')}
      ${extra > 0 ? `<span class="fc-more">+${extra} more</span>` : ''}
    </div>` : ''}
    <div class="mc-stats">
      <div class="mc-stat">
        <span class="mc-stat-l">Version</span>
        <span class="mc-stat-v ${trained ? 'blue' : 'dim'}">v${m.version || 0}</span>
      </div>
      <div class="mc-stat">
        <span class="mc-stat-l">Accuracy</span>
        <span class="mc-stat-v ${m.performance != null ? 'green' : 'dim'}">${acc}</span>
      </div>
      <div class="mc-stat">
        <span class="mc-stat-l">Features</span>
        <span class="mc-stat-v blue">${feats.length}</span>
      </div>
    </div>
  </div>`;
}

// ── DETAIL PANEL ──────────────────────────────────────────────────────────────
function openPanel(i) {
  const m = models[i];
  if (!m) return;

  const trained = (m.version || 0) > 0;
  const acc     = m.performance != null ? (m.performance * 100).toFixed(1) + '%' : 'Not yet measured';
  const feats   = Array.isArray(m.features) ? m.features : [];

  document.getElementById('p-name').textContent   = m.name;
  document.getElementById('p-desc').textContent   = m.description || 'No description provided.';
  document.getElementById('p-target').textContent = m.target || '—';
  document.getElementById('p-ver').textContent    = `v${m.version || 0}`;
  document.getElementById('p-acc').textContent    = acc;
  document.getElementById('p-upd').textContent    = m.last_updated || '—';
  document.getElementById('p-status').innerHTML   = `<span class="spill ${trained ? 'trained' : 'untrained'}">${trained ? '● Active' : '○ Not trained'}</span>`;
  document.getElementById('p-feats').innerHTML    = feats.length
    ? feats.map(f => `<span class="feat-pill">${esc(f)}</span>`).join('')
    : '<span style="color:var(--t3);font-size:13px">No features yet — model needs training</span>';

  document.getElementById('panel-overlay').classList.add('open');
  document.getElementById('panel').classList.add('open');
}

function closePanel() {
  document.getElementById('panel-overlay').classList.remove('open');
  document.getElementById('panel').classList.remove('open');
}

// ── AUTH ──────────────────────────────────────────────────────────────────────
async function doLogout() {
  await fetch('/api/portal/logout', {method:'POST',headers:{'Content-Type':'application/json'},body:'{}'});
  window.location.href = '/login';
}
async function doDelete() {
  if (!confirm('Delete your account permanently?')) return;
  await fetch('/api/portal/delete_account', {method:'POST',headers:{'Content-Type':'application/json'},body:'{}'});
  window.location.href = '/login';
}

// ── MODAL ─────────────────────────────────────────────────────────────────────
function openM(id)  { document.getElementById(id).classList.add('open'); }
function closeM(id) { document.getElementById(id).classList.remove('open'); }
document.addEventListener('click', e => { if(e.target.classList.contains('overlay')) e.target.classList.remove('open'); });

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
</script>
</body>
</html>
